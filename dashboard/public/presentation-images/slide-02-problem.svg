<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <radialGradient id="dangerglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#7f1d1d" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0a0a14" stop-opacity="0"/>
    </radialGradient>
    <filter id="redglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="crack-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <linearGradient id="crackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F87171" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <ellipse cx="200" cy="200" rx="190" ry="190" fill="url(#dangerglow)"/>

  <!-- Background binary rain (faint) -->
  <g opacity="0.06" fill="#EF4444" font-family="monospace" font-size="9">
    <text x="50" y="60">01101</text>
    <text x="310" y="45">10010</text>
    <text x="30" y="340">11001</text>
    <text x="320" y="360">01110</text>
    <text x="90" y="380">10101</text>
    <text x="280" y="80">00110</text>
  </g>

  <!-- Shattered shield — outer fragments -->
  <path d="M200 40 L320 100 L320 210 C320 280 200 330 200 330 C200 330 80 280 80 210 L80 100 Z"
        stroke="#F87171" stroke-width="1.5" opacity="0.2"/>

  <!-- Left shield fragment breaking away -->
  <g transform="translate(-4, 3) rotate(-3, 140, 200)" opacity="0.35">
    <path d="M200 40 L140 70 L80 100 L80 210 C80 250 120 280 160 300"
          stroke="#F87171" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Right shield fragment breaking away -->
  <g transform="translate(5, 4) rotate(2, 260, 200)" opacity="0.3">
    <path d="M200 40 L260 70 L320 100 L320 210 C320 250 280 280 240 300"
          stroke="#F87171" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Major crack — deep fissure with glow -->
  <path d="M190 55 L198 110 L178 145 L202 190 L172 235 L195 275 L185 310 L200 335"
        stroke="url(#crackGrad)" stroke-width="2.5" opacity="0.8" stroke-linecap="round"
        filter="url(#redglow)"/>

  <!-- Secondary cracks branching out -->
  <path d="M198 110 L230 125 L248 160 L255 180" stroke="#EF4444" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <path d="M178 145 L148 158 L130 185 L120 210" stroke="#EF4444" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <path d="M202 190 L235 200 L260 215" stroke="#EF4444" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
  <path d="M172 235 L145 248 L128 265" stroke="#EF4444" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
  <path d="M195 275 L220 288 L245 285" stroke="#EF4444" stroke-width="1" opacity="0.35" stroke-linecap="round"/>

  <!-- Tertiary hairline cracks -->
  <path d="M248 160 L270 148 L282 155" stroke="#F87171" stroke-width="0.7" opacity="0.3" stroke-linecap="round"/>
  <path d="M130 185 L115 175 L100 180" stroke="#F87171" stroke-width="0.7" opacity="0.3" stroke-linecap="round"/>
  <path d="M120 210 L105 225 L95 220" stroke="#F87171" stroke-width="0.7" opacity="0.25" stroke-linecap="round"/>

  <!-- Warning triangles — layered -->
  <g opacity="0.7" transform="translate(130, 95)" filter="url(#redglow)">
    <polygon points="20,0 40,35 0,35" stroke="#FBBF24" stroke-width="2" fill="none"/>
    <text x="20" y="28" text-anchor="middle" fill="#FBBF24" font-size="20" font-weight="bold">!</text>
  </g>
  <g opacity="0.5" transform="translate(245, 120)">
    <polygon points="14,0 28,24 0,24" stroke="#FBBF24" stroke-width="1.5" fill="none"/>
    <text x="14" y="20" text-anchor="middle" fill="#FBBF24" font-size="15" font-weight="bold">!</text>
  </g>
  <g opacity="0.35" transform="translate(100, 250)">
    <polygon points="11,0 22,19 0,19" stroke="#FBBF24" stroke-width="1.2" fill="none"/>
    <text x="11" y="16" text-anchor="middle" fill="#FBBF24" font-size="12" font-weight="bold">!</text>
  </g>
  <g opacity="0.25" transform="translate(255, 260)">
    <polygon points="9,0 18,16 0,16" stroke="#FBBF24" stroke-width="1" fill="none"/>
    <text x="9" y="13" text-anchor="middle" fill="#FBBF24" font-size="10" font-weight="bold">!</text>
  </g>

  <!-- Floating debris with motion -->
  <circle cx="90" cy="80" r="3" fill="#F87171" opacity="0.3">
    <animate attributeName="cy" values="80;75;80" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="90" r="3.5" fill="#F87171" opacity="0.25">
    <animate attributeName="cy" values="90;85;90" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="260" r="2.5" fill="#F87171" opacity="0.2">
    <animate attributeName="cx" values="340;345;340" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="270" r="3" fill="#F87171" opacity="0.2">
    <animate attributeName="cx" values="60;55;60" dur="4.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Small shard fragments -->
  <polygon points="85,105 92,98 95,108" fill="#F87171" opacity="0.15" transform="rotate(-15, 90, 103)"/>
  <polygon points="305,95 315,88 318,100" fill="#F87171" opacity="0.12" transform="rotate(10, 312, 94)"/>
  <polygon points="325,245 335,240 332,252" fill="#F87171" opacity="0.1" transform="rotate(5, 330, 246)"/>

  <!-- Pulse rings emanating from crack center -->
  <circle cx="200" cy="190" r="40" stroke="#EF4444" stroke-width="0.5" opacity="0.15">
    <animate attributeName="r" values="40;80" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="190" r="40" stroke="#EF4444" stroke-width="0.5" opacity="0.15">
    <animate attributeName="r" values="40;80" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
