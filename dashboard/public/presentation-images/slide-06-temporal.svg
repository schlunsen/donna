<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="tflow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7B2D8E" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="checkpoint" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ADE80" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a0a14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="activeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0a0a14" stop-opacity="0"/>
    </radialGradient>
    <filter id="checkglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="activepulse" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background timeline track -->
  <rect x="76" y="45" width="8" height="310" rx="4" fill="#1a1a2e" opacity="0.5"/>

  <!-- Main timeline spine -->
  <line x1="80" y1="50" x2="80" y2="350" stroke="url(#tflow)" stroke-width="2.5" opacity="0.5"/>

  <!-- Progress fill (completed portion) -->
  <line x1="80" y1="50" x2="80" y2="260" stroke="#4ADE80" stroke-width="2" opacity="0.2"/>

  <!-- ===== Checkpoint 1 — completed ===== -->
  <ellipse cx="80" cy="80" rx="32" ry="32" fill="url(#checkpoint)"/>
  <circle cx="80" cy="80" r="14" stroke="#4ADE80" stroke-width="1.8" opacity="0.7" filter="url(#checkglow)"/>
  <circle cx="80" cy="80" r="14" fill="#4ADE80" opacity="0.08"/>
  <path d="M72 80 L77 85 L89 73" stroke="#4ADE80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <line x1="98" y1="80" x2="175" y2="80" stroke="#4ADE80" stroke-width="0.6" opacity="0.25" stroke-dasharray="3 3"/>
  <text x="182" y="74" fill="#4ADE80" font-size="11" font-family="monospace" opacity="0.7" font-weight="600">recon.start()</text>
  <text x="182" y="89" fill="#C090C0" font-size="8.5" font-family="monospace" opacity="0.4">00:00:00 · 14 targets found</text>

  <!-- ===== Checkpoint 2 — completed ===== -->
  <ellipse cx="80" cy="160" rx="32" ry="32" fill="url(#checkpoint)"/>
  <circle cx="80" cy="160" r="14" stroke="#4ADE80" stroke-width="1.8" opacity="0.7" filter="url(#checkglow)"/>
  <circle cx="80" cy="160" r="14" fill="#4ADE80" opacity="0.08"/>
  <path d="M72 160 L77 165 L89 153" stroke="#4ADE80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <line x1="98" y1="160" x2="175" y2="160" stroke="#4ADE80" stroke-width="0.6" opacity="0.25" stroke-dasharray="3 3"/>
  <text x="182" y="154" fill="#4ADE80" font-size="11" font-family="monospace" opacity="0.7" font-weight="600">scan.ports()</text>
  <text x="182" y="169" fill="#C090C0" font-size="8.5" font-family="monospace" opacity="0.4">00:02:14 · 847 ports scanned</text>

  <!-- Branch — parallel workflows -->
  <path d="M80 185 Q80 208 125 218 Q155 225 155 255" stroke="#7B2D8E" stroke-width="1.2" opacity="0.3" fill="none"/>
  <path d="M80 185 Q80 208 35 218 Q15 225 25 255" stroke="#7B2D8E" stroke-width="1.2" opacity="0.3" fill="none"/>
  <!-- Branch labels -->
  <text x="155" y="248" fill="#7B2D8E" font-size="7" font-family="monospace" opacity="0.3">thread-b</text>
  <text x="5" y="248" fill="#7B2D8E" font-size="7" font-family="monospace" opacity="0.3">thread-a</text>
  <!-- Branch nodes -->
  <circle cx="155" cy="258" r="4" stroke="#7B2D8E" stroke-width="1" opacity="0.3" fill="none"/>
  <circle cx="25" cy="258" r="4" stroke="#7B2D8E" stroke-width="1" opacity="0.3" fill="none"/>

  <!-- ===== Checkpoint 3 — completed ===== -->
  <ellipse cx="80" cy="240" rx="32" ry="32" fill="url(#checkpoint)"/>
  <circle cx="80" cy="240" r="14" stroke="#4ADE80" stroke-width="1.8" opacity="0.7" filter="url(#checkglow)"/>
  <circle cx="80" cy="240" r="14" fill="#4ADE80" opacity="0.08"/>
  <path d="M72 240 L77 245 L89 233" stroke="#4ADE80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <line x1="98" y1="240" x2="175" y2="240" stroke="#4ADE80" stroke-width="0.6" opacity="0.25" stroke-dasharray="3 3"/>
  <text x="182" y="234" fill="#4ADE80" font-size="11" font-family="monospace" opacity="0.7" font-weight="600">analyze.vulns()</text>
  <text x="182" y="249" fill="#C090C0" font-size="8.5" font-family="monospace" opacity="0.4">00:08:32 · 23 vulns classified</text>

  <!-- ===== Checkpoint 4 — active/running ===== -->
  <ellipse cx="80" cy="320" rx="35" ry="35" fill="url(#activeGlow)"/>
  <!-- Pulsing ring -->
  <circle cx="80" cy="320" r="18" stroke="#FBBF24" stroke-width="1" opacity="0.2" filter="url(#activepulse)">
    <animate attributeName="r" values="18;28" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="320" r="16" stroke="#7B2D8E" stroke-width="1.5" opacity="0.5"/>
  <circle cx="80" cy="320" r="13" stroke="#FBBF24" stroke-width="1.8" opacity="0.8" stroke-dasharray="3.5 2.5">
    <animateTransform attributeName="transform" type="rotate" from="0 80 320" to="360 80 320" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="320" r="4.5" fill="#FBBF24" opacity="0.8"/>
  <line x1="100" y1="320" x2="175" y2="320" stroke="#FBBF24" stroke-width="0.6" opacity="0.3" stroke-dasharray="3 3"/>
  <text x="182" y="314" fill="#FBBF24" font-size="11" font-family="monospace" opacity="0.7" font-weight="600">exploit.run()</text>
  <text x="182" y="329" fill="#FBBF24" font-size="8.5" font-family="monospace" opacity="0.5">00:12:47 · 3 exploits active</text>

  <!-- Retry arc with arrow -->
  <path d="M48 278 Q28 300 48 322" stroke="#EF4444" stroke-width="1" opacity="0.35" fill="none"/>
  <polygon points="45,318 48,324 53,319" fill="#EF4444" opacity="0.35"/>
  <text x="12" y="303" fill="#EF4444" font-size="7.5" font-family="monospace" opacity="0.35">retry #2</text>

  <!-- Decorative: elapsed time -->
  <text x="365" y="390" fill="#C090C0" font-size="8" font-family="monospace" opacity="0.2" text-anchor="end">elapsed: 12m47s</text>

  <!-- Decorative corner brackets -->
  <path d="M10 15 L10 5 L20 5" stroke="#7B2D8E" stroke-width="0.6" opacity="0.15"/>
  <path d="M390 15 L390 5 L380 5" stroke="#7B2D8E" stroke-width="0.6" opacity="0.15"/>
</svg>
