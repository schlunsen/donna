<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="tflow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7B2D8E" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="checkpoint" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ADE80" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a0a14" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Main timeline spine -->
  <line x1="80" y1="50" x2="80" y2="350" stroke="url(#tflow)" stroke-width="2" opacity="0.5"/>
  <!-- Checkpoint 1 - completed -->
  <ellipse cx="80" cy="80" rx="30" ry="30" fill="url(#checkpoint)"/>
  <circle cx="80" cy="80" r="12" stroke="#4ADE80" stroke-width="1.5" opacity="0.7"/>
  <path d="M73 80 L78 85 L88 74" stroke="#4ADE80" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="95" y1="80" x2="180" y2="80" stroke="#4ADE80" stroke-width="0.5" opacity="0.3" stroke-dasharray="4 3"/>
  <text x="190" y="75" fill="#4ADE80" font-size="11" font-family="monospace" opacity="0.6">recon.start()</text>
  <text x="190" y="90" fill="#C090C0" font-size="9" font-family="monospace" opacity="0.4">00:00:00 - completed</text>
  <!-- Checkpoint 2 - completed -->
  <ellipse cx="80" cy="160" rx="30" ry="30" fill="url(#checkpoint)"/>
  <circle cx="80" cy="160" r="12" stroke="#4ADE80" stroke-width="1.5" opacity="0.7"/>
  <path d="M73 160 L78 165 L88 154" stroke="#4ADE80" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="95" y1="160" x2="180" y2="160" stroke="#4ADE80" stroke-width="0.5" opacity="0.3" stroke-dasharray="4 3"/>
  <text x="190" y="155" fill="#4ADE80" font-size="11" font-family="monospace" opacity="0.6">scan.ports()</text>
  <text x="190" y="170" fill="#C090C0" font-size="9" font-family="monospace" opacity="0.4">00:02:14 - completed</text>
  <!-- Branch point -->
  <path d="M80 190 Q80 210 120 220 Q160 230 160 260" stroke="#7B2D8E" stroke-width="1" opacity="0.3"/>
  <path d="M80 190 Q80 210 40 220 Q20 230 30 260" stroke="#7B2D8E" stroke-width="1" opacity="0.3"/>
  <!-- Checkpoint 3 - completed -->
  <ellipse cx="80" cy="240" rx="30" ry="30" fill="url(#checkpoint)"/>
  <circle cx="80" cy="240" r="12" stroke="#4ADE80" stroke-width="1.5" opacity="0.7"/>
  <path d="M73 240 L78 245 L88 234" stroke="#4ADE80" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="95" y1="240" x2="180" y2="240" stroke="#4ADE80" stroke-width="0.5" opacity="0.3" stroke-dasharray="4 3"/>
  <text x="190" y="235" fill="#4ADE80" font-size="11" font-family="monospace" opacity="0.6">analyze.vulns()</text>
  <text x="190" y="250" fill="#C090C0" font-size="9" font-family="monospace" opacity="0.4">00:08:32 - completed</text>
  <!-- Checkpoint 4 - active/running -->
  <circle cx="80" cy="320" r="16" stroke="#7B2D8E" stroke-width="1.5" opacity="0.6"/>
  <circle cx="80" cy="320" r="12" stroke="#FBBF24" stroke-width="1.5" opacity="0.8" stroke-dasharray="3 2"/>
  <circle cx="80" cy="320" r="4" fill="#FBBF24" opacity="0.7"/>
  <line x1="100" y1="320" x2="180" y2="320" stroke="#FBBF24" stroke-width="0.5" opacity="0.3" stroke-dasharray="4 3"/>
  <text x="190" y="315" fill="#FBBF24" font-size="11" font-family="monospace" opacity="0.6">exploit.run()</text>
  <text x="190" y="330" fill="#FBBF24" font-size="9" font-family="monospace" opacity="0.5">00:12:47 - running...</text>
  <!-- Retry arrow (decorative) -->
  <path d="M50 280 Q30 300 50 320" stroke="#EF4444" stroke-width="0.8" opacity="0.3" fill="none"/>
  <path d="M47 315 L50 320 L55 316" stroke="#EF4444" stroke-width="0.8" opacity="0.3"/>
  <text x="15" y="302" fill="#EF4444" font-size="8" font-family="monospace" opacity="0.3">retry</text>
</svg>