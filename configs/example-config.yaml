# Example configuration file for pentest-agent
# Copy this file and modify it for your specific testing needs

authentication:
  login_type: form  # Options: 'form' or 'sso'
  login_url: "https://example.com/login"
  credentials:
    username: "testuser"
    password: "testpassword"
    totp_secret: "JBSWY3DPEHPK3PXP"  # Optional TOTP secret for 2FA
  
  # Natural language instructions for login flow
  login_flow:
    - "Type $username into the email field"
    - "Type $password into the password field"
    - "Click the 'Sign In' button"
    - "Enter $totp in the verification code field"
    - "Click 'Verify'"
  
  success_condition:
    type: url_contains  # Options: 'url_contains' or 'element_present'
    value: "/dashboard"

rules:
  avoid:
    - description: "Do not test the marketing site subdomain"
      type: subdomain
      url_path: "www"
    
    - description: "Skip logout functionality"
      type: path
      url_path: "/logout"
    
    - description: "No DELETE operations on user API"
      type: path
      url_path: "/api/v1/users/*"
  
  focus:
    - description: "Prioritize beta admin panel subdomain"
      type: subdomain
      url_path: "beta-admin"

    - description: "Focus on user profile updates"
      type: path
      url_path: "/api/v2/user-profile"

# Pipeline execution settings (optional)
# pipeline:
#   retry_preset: subscription          # 'default' or 'subscription' (6h max retry for rate limit recovery)
#   max_concurrent_pipelines: 2         # 1-5, default: 5 (reduce to lower API usage spikes)
#   concurrency:                        # Fine-grained concurrency limits
#     pipelines: 3                      # Max concurrent vuln→exploit pipeline pairs (default: 5)
#     max_browsers: 2                   # Max concurrent Playwright browser instances (default: 3)
#   model_profile: claude               # Which model profile to use (see 'models' section below)
#   model_tiers:                        # Override default model tiers per agent
#     pre-recon: large                  # Default: large (Opus — deep code analysis)
#     recon: medium                     # Default: medium (Sonnet — general analysis)
#     injection-vuln: medium            # Default: medium
#     injection-exploit: large          # Default: large (Opus — complex exploitation)
#     xss-exploit: medium               # Default: medium
#     auth-exploit: large               # Default: large
#     ssrf-exploit: large               # Default: large
#     report: small                     # Default: small (Haiku — summarization)

