# Docker Compose for Tauri desktop mode.
# Only runs Temporal server — dashboard and worker run as native sidecars.
# Security tools still run in Docker when scans require them.

services:
  temporal:
    image: temporalio/temporal:latest
    command:
      [
        "server",
        "start-dev",
        "--db-filename",
        "/home/temporal/temporal.db",
        "--ip",
        "0.0.0.0",
      ]
    ports:
      - "127.0.0.1:7233:7233" # gRPC
      - "127.0.0.1:8233:8233" # Web UI (built-in)
    volumes:
      - temporal-data:/home/temporal
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "temporal",
          "operator",
          "cluster",
          "health",
          "--address",
          "localhost:7233",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  temporal-data:
