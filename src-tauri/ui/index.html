<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donna — AI Pentesting</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .logo {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #7c3aed, #a855f7, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 2.5rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #1a1a2e;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      font-size: 0.85rem;
      color: #666;
      min-height: 1.2em;
    }
    .status.error { color: #ef4444; }
    .steps {
      margin-top: 2rem;
      text-align: left;
      display: inline-block;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.35rem 0;
      font-size: 0.8rem;
      color: #555;
      transition: color 0.3s;
    }
    .step.active { color: #a855f7; }
    .step.done { color: #22c55e; }
    .step.failed { color: #ef4444; }
    .step-icon {
      width: 16px;
      text-align: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Donna</div>
    <div class="subtitle">AI Pentesting Platform</div>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Initializing...</div>
    <div class="steps" id="steps">
      <div class="step" id="step-docker" data-step="docker">
        <span class="step-icon">&#9675;</span> Checking Docker
      </div>
      <div class="step" id="step-temporal" data-step="temporal">
        <span class="step-icon">&#9675;</span> Starting Temporal
      </div>
      <div class="step" id="step-dashboard" data-step="dashboard">
        <span class="step-icon">&#9675;</span> Starting Dashboard
      </div>
      <div class="step" id="step-worker" data-step="worker">
        <span class="step-icon">&#9675;</span> Starting Worker
      </div>
    </div>
  </div>
  <script>
    // Listen for status updates from the Rust backend
    if (window.__TAURI__) {
      const { listen } = window.__TAURI__.event;
      listen('startup-progress', (event) => {
        const { step, state, message } = event.payload;
        const statusEl = document.getElementById('status');
        if (message) statusEl.textContent = message;

        const stepEl = document.getElementById('step-' + step);
        if (stepEl) {
          stepEl.className = 'step ' + state;
          const icon = stepEl.querySelector('.step-icon');
          if (state === 'active') icon.innerHTML = '&#9684;';
          else if (state === 'done') icon.innerHTML = '&#10003;';
          else if (state === 'failed') icon.innerHTML = '&#10007;';
        }

        if (state === 'failed') {
          statusEl.className = 'status error';
          document.getElementById('spinner').style.display = 'none';
        }
      });

      listen('startup-navigate', (event) => {
        window.location.replace(event.payload.url);
      });
    }
  </script>
</body>
</html>
